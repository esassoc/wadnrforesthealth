<div class="modal">
<div class="modal-header">
    <h3>{{ modalTitle }}</h3>
</div>
<div class="modal-body">
    <modal-alerts [alerts]="localAlerts" (onClosed)="removeLocalAlert($event)"></modal-alerts>

    <form [formGroup]="form">
        <form-field
            [formControl]="form.controls.RelationshipTypeName"
            fieldLabel="Name"
            [type]="FormFieldType.Text"
            placeholder="Enter relationship type name">
        </form-field>

        <form-field
            [formControl]="form.controls.RelationshipTypeDescription"
            fieldLabel="Description"
            [type]="FormFieldType.Textarea"
            placeholder="Enter description">
        </form-field>

        <form-field
            [formControl]="form.controls.CanStewardProjects"
            fieldLabel="Can Steward Projects"
            [type]="FormFieldType.Toggle">
        </form-field>

        <form-field
            [formControl]="form.controls.IsPrimaryContact"
            fieldLabel="Is Primary Contact"
            [type]="FormFieldType.Toggle">
        </form-field>

        <form-field
            [formControl]="form.controls.CanOnlyBeRelatedOnceToAProject"
            fieldLabel="Can Only Be Related Once To A Project"
            [type]="FormFieldType.Toggle">
        </form-field>

        <form-field
            [formControl]="form.controls.ShowOnFactSheet"
            fieldLabel="Show on Fact Sheet"
            [type]="FormFieldType.Toggle">
        </form-field>

        <form-field
            [formControl]="form.controls.ReportInAccomplishmentsDashboard"
            fieldLabel="Report in Accomplishments Dashboard"
            [type]="FormFieldType.Toggle">
        </form-field>

        <form-field
            [formControl]="selectedOrgTypeIDs"
            fieldLabel="Associated Organization Types"
            [type]="FormFieldType.Select"
            [formInputOptions]="orgTypeOptions"
            formInputOptionLabel="Label"
            formInputOptionValue="Value"
            [multiple]="true"
            placeholder="Select organization types">
        </form-field>
    </form>
</div>
<div class="modal-footer">
    <button
        class="btn btn-primary"
        (click)="save()"
        [disabled]="isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Save' }}
    </button>
    <button
        class="btn btn-secondary"
        (click)="cancel()"
        [disabled]="isSubmitting">
        Cancel
    </button>
</div>
</div>
