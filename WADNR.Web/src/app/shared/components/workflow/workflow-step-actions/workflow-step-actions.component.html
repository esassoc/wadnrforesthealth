<div class="workflow-step-actions">
    <div class="required-note">
        <span class="required-indicator">*</span> Required field
    </div>
    <div class="workflow-step-buttons">
        <button
            type="button"
            class="btn btn-outline-primary"
            (click)="onSaveClick()"
            [disabled]="isSaving">
            @if (isSaving) {
                {{ savingText }}
            } @else {
                {{ saveButtonText }}
            }
        </button>
        <button
            type="button"
            class="btn btn-primary"
            (click)="onSaveAndContinueClick()"
            [disabled]="isSaving">
            @if (isSaving) {
                {{ savingText }}
            } @else {
                {{ continueButtonText }}
            }
        </button>
    </div>
</div>
