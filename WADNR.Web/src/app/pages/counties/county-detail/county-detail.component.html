@if (countyDetailPageData$ | async; as vm) {
<breadcrumb [items]="[{ label: 'Counties', url: '/counties' }, { label: vm.county.CountyName }]" [linkLast]="false"></breadcrumb>
<page-header pageTitle="{{ vm.county.CountyName }} County"> </page-header>
<div class="grid-12">
    <div class="g-col-6">
        <div class="card">
            <div class="card-header"><span class="card-title">Map</span></div>
            <div class="card-body">
                <wadnr-map [mapHeight]="'400px'" [selectedTileLayer]="'Terrain'" [showLegend]="false" (onMapLoad)="handleMapReady($event)">
                    <counties-layer [map]="map" [layerControl]="layerControl" [selectedIDs]="[vm.county.CountyID]" [mode]="highlightedCountyLayerMode"></counties-layer>
                    <counties-layer [map]="map" [layerControl]="layerControl" [mode]="allCountiesLayerMode" [fitBoundsOnWmsAddToControl]="false"></counties-layer>
                </wadnr-map>
            </div>
        </div>
    </div>
    <div class="g-col-12">
        <div class="card">
            <div class="card-header"><span class="card-title">Projects</span></div>
            <div class="card-body">
                <project-grid [rowData]="vm.projects" defaultRowSelection="multiRow"> </project-grid>
            </div>
        </div>
    </div>
</div>
}
