<div class="modal">
    <div class="modal-header">
        <h3>Upload LOA {{ regionTitle }} Excel File</h3>
    </div>
    <div class="modal-body">
        <modal-alerts [alerts]="localAlerts" (onClosed)="removeLocalAlert($event)"></modal-alerts>
        <p>Select an <strong>.xlsx</strong> Excel file containing LOA data for the <strong>{{ regionTitle }}</strong> region.</p>
        <p>The file should contain a "Master Data" sheet with the standard LOA column layout.</p>
        <form-field
            [formControl]="fileControl"
            fieldLabel="Excel File"
            [type]="FormFieldType.File"
            uploadFileAccepts=".xlsx">
        </form-field>
    </div>
    <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cancel()" [disabled]="isSubmitting()">Cancel</button>
        <button class="btn btn-primary" (click)="upload()" [buttonLoading]="isSubmitting()" [disabled]="!fileControl.value || isSubmitting()">Upload</button>
    </div>
</div>
