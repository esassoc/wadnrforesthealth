<div class="modal">
<div class="modal-header">
    <h3>{{ modalTitle }}</h3>
</div>
<div class="modal-body" [loadingSpinner]="{ isLoading: isLoading(), loadingHeight: 300 }">
    <modal-alerts [alerts]="localAlerts()" (onClosed)="removeLocalAlert($event)"></modal-alerts>

    <form [formGroup]="form">
        <form-field
            [formControl]="form.controls.OrganizationName"
            fieldLabel="Name"
            [type]="FormFieldType.Text"
            placeholder="Enter organization name">
        </form-field>

        <form-field
            [formControl]="form.controls.OrganizationShortName"
            fieldLabel="Short Name"
            [type]="FormFieldType.Text"
            placeholder="Enter short name">
        </form-field>

        <form-field
            [formControl]="form.controls.OrganizationTypeID"
            fieldDefinitionName="OrganizationType"
            fieldDefinitionLabelOverride="Contributing Organization Type"
            [type]="FormFieldType.Select"
            [formInputOptions]="organizationTypeOptions"
            formInputOptionLabel="Label"
            formInputOptionValue="Value"
            placeholder="Select organization type">
        </form-field>

        <form-field
            [formControl]="form.controls.PrimaryContactPersonID"
            fieldDefinitionName="OrganizationPrimaryContact"
            fieldDefinitionLabelOverride="Contributing Organization Primary Contact"
            [type]="FormFieldType.Select"
            [formInputOptions]="personOptions"
            formInputOptionLabel="Label"
            formInputOptionValue="Value"
            placeholder="Select primary contact">
        </form-field>

        <div class="form-field">
            <label class="field-label" for="vendor-select">Vendor</label>
            <ng-select
                class="custom"
                [items]="vendorResults$ | async"
                [formControl]="form.controls.VendorID"
                bindLabel="DisplayName"
                bindValue="VendorID"
                [typeahead]="vendorSearch$"
                [loading]="vendorLoading"
                [clearable]="true"
                [minTermLength]="2"
                dropdownPosition="auto"
                typeToSearchText="Type to search vendors..."
                placeholder="Search Vendor Name or Statewide Vendor Number"
                appendTo="#dropdown-host"
                labelForId="vendor-select"
                aria-label="Vendor">
            </ng-select>
        </div>

        <form-field
            [formControl]="form.controls.OrganizationUrl"
            fieldLabel="Home Page"
            [type]="FormFieldType.Text"
            placeholder="https://example.com">
        </form-field>

        <form-field
            [formControl]="logoFileControl"
            fieldLabel="Logo"
            [type]="FormFieldType.File"
            uploadFileAccepts=".jpg,.jpeg,.gif,.png">
        </form-field>

        <form-field
            [formControl]="form.controls.IsActive"
            fieldLabel="Is Active"
            [type]="FormFieldType.Toggle">
        </form-field>
    </form>
</div>
<div class="modal-footer">
    <button
        class="btn btn-primary"
        (click)="save()"
        [buttonLoading]="isSubmitting()"
        [disabled]="isLoading() || isSubmitting()">
        Save
    </button>
    <button
        class="btn btn-secondary"
        (click)="cancel()"
        [disabled]="isSubmitting()">
        Cancel
    </button>
</div>
</div>
