<page-header pageTitle="Pending Projects" [customRichTextTypeID]="customRichTextTypeID"></page-header>

<div class="page-body">
    <div class="d-flex justify-content-end mb-3">
        <a class="btn btn-primary" [routerLink]="['/projects/new']">
            <span class="fas fa-plus"></span> Propose New Project
        </a>
    </div>
    <wadnr-grid
        [rowData]="projects$ | async"
        [columnDefs]="columnDefs"
        [pinnedTotalsRow]="pinnedTotalsRow"
        downloadFileName="pending-projects">
    </wadnr-grid>
</div>
