<page-header pageTitle="Project Types" [customRichTextTypeID]="customRichTextTypeID"></page-header>

<div class="page-body">
    <div class="flex-between no-wrap mb-2">
        <div></div>
        @if (isAdmin) {
            <button class="btn btn-sm btn-primary" (click)="openCreateProjectType()">Create New Project Type</button>
        }
    </div>
    <wadnr-grid [rowData]="projectTypes$ | async" [columnDefs]="columnDefs" downloadFileName="project-types" [sizeColumnsToFitGrid]="true"></wadnr-grid>
</div>
