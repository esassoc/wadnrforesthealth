<page-header pageTitle="Project Themes"></page-header>

<div class="page-body">
    <div class="flex-between no-wrap mb-2">
        <div></div>
        @if (isAdmin) {
            <div>
                <button class="btn btn-sm btn-secondary mr-2" (click)="openEditSortOrder()">Edit Sort Order</button>
                <button class="btn btn-sm btn-primary" (click)="openCreateTheme()">Create New Theme</button>
            </div>
        }
    </div>
    <wadnr-grid [rowData]="themes$ | async" [columnDefs]="columnDefs" downloadFileName="project-themes" fullscreenTitle="Project Themes" [sizeColumnsToFitGrid]="true"></wadnr-grid>
</div>
