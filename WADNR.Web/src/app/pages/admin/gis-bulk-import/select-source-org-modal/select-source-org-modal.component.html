<div class="modal">
<div class="modal-header">
    <h3>GIS Import/Update</h3>
</div>
<div class="modal-body">
    <modal-alerts [alerts]="localAlerts"></modal-alerts>
    @if (sourceOrgs$ | async) {
        <p>Select the source organization for your GIS upload:</p>
        <div class="grid-12">
            <div class="g-col-12">
                <form-field
                    [formControl]="sourceOrgControl"
                    fieldLabel="Source Organization"
                    [type]="FormFieldType.Select"
                    [formInputOptions]="sourceOrgOptions"
                    placeholder="Select a source organization">
                </form-field>
            </div>
        </div>
    } @else {
        <span class="fa fa-spinner fa-spin"></span> Loading source organizations...
    }
</div>
<div class="modal-footer">
    <button class="btn btn-primary" (click)="continue()" [disabled]="isCreating || !sourceOrgControl.value">
        @if (isCreating) {
            <span class="fa fa-spinner fa-spin"></span> Creating...
        } @else {
            Continue
        }
    </button>
    <button class="btn btn-secondary" (click)="ref.close()">Cancel</button>
</div>
</div>
