<div class="modal">
    <div class="modal-header">
        <h3>{{ modalTitle }}</h3>
    </div>
    <div class="modal-body">
        <modal-alerts [alerts]="localAlerts" (onClosed)="removeLocalAlert($event)"></modal-alerts>

        <form [formGroup]="form">
            <form-field
                [formControl]="form.controls.displayName"
                fieldDefinitionName="ReportTitle"
                fieldDefinitionLabelOverride="Report Title"
                [type]="FormFieldType.Text"
                placeholder="Enter display name (max 50 characters)">
            </form-field>

            <form-field
                [formControl]="form.controls.description"
                fieldDefinitionName="ReportDescription"
                fieldDefinitionLabelOverride="Report Description"
                [type]="FormFieldType.Textarea"
                placeholder="Enter description (max 250 characters)">
            </form-field>

            <form-field
                [formControl]="form.controls.reportTemplateModelID"
                fieldDefinitionName="ReportModel"
                fieldDefinitionLabelOverride="Report Model"
                [type]="FormFieldType.Select"
                [formInputOptions]="modelOptions"
                formInputOptionLabel="Label"
                formInputOptionValue="Value"
                placeholder="Select model">
            </form-field>

            @if (mode === "edit" && reportTemplate?.OriginalFileName) {
                <div class="mt-4">
                    <alert [alert]="existingFileAlert">
                        <span>
                            This report currently has a template: "<a [href]="existingFileUrl" target="_blank">{{ reportTemplate.OriginalFileName }}</a
                            >". Using the field below will replace the current template.
                        </span>
                    </alert>
                </div>
            }

            <form-field
                [formControl]="fileControl"
                fieldDefinitionName="ReportFile"
                fieldDefinitionLabelOverride="Report File"
                [type]="FormFieldType.File"
                uploadFileAccepts=".docx,.doc">
            </form-field>
        </form>
    </div>
    <div class="modal-footer">
        <button class="btn btn-primary" (click)="save()" [disabled]="isSubmitting$ | async" [buttonLoading]="isSubmitting$ | async">Save</button>
        <button class="btn btn-secondary" (click)="cancel()" [disabled]="isSubmitting$ | async">Cancel</button>
    </div>
</div>
