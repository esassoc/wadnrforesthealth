<page-header pageTitle="Manage Report Templates" [customRichTextTypeID]="customRichTextTypeID"></page-header>

<div class="page-body">
    <wadnr-grid
        [rowData]="reportTemplates$ | async"
        [columnDefs]="columnDefs"
        downloadFileName="report-templates"
        fullscreenTitle="Report Templates">
        @if (isAdmin) {
            <div customGridActionsRight>
                <button class="btn btn-sm btn-primary" (click)="openCreateModal()">
                    New Report Template
                </button>
            </div>
        }
    </wadnr-grid>

    <div class="card mt-4">
        <div class="card-header">
            <span class="card-title">Documentation</span>
        </div>
        <div class="card-body">
            <table class="table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><a href="assets/documents/Reports-User-Guide.pdf" target="_blank">Report Center User Guide</a></td>
                        <td>General Report Center functionality documentation and code examples</td>
                    </tr>
                    <tr>
                        <td><a href="assets/documents/Reports-Model-Documentation.xlsx" target="_blank">Model Documentation</a></td>
                        <td>Detailed documentation of report models and their attributes</td>
                    </tr>
                    <tr>
                        <td><a href="assets/documents/Reports-Example-Report.docx" target="_blank">Example Report</a></td>
                        <td>Functional example of a report template</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
