<div class="modal">
<div class="modal-header">
    <h3>GIS Import/Update</h3>
</div>
<div class="modal-body" [loadingSpinner]="{ isLoading: !(sourceOrgs$ | async), loadingHeight: 100, opacity: 0 }">
    <modal-alerts [alerts]="localAlerts"></modal-alerts>
    @if (sourceOrgs$ | async) {
        <p>Select the source organization for your GIS upload:</p>
        <div class="grid-12">
            <div class="g-col-12">
                <form-field
                    [formControl]="sourceOrgControl"
                    fieldLabel="Source Organization"
                    [type]="FormFieldType.Select"
                    [formInputOptions]="sourceOrgOptions"
                    placeholder="Select a source organization">
                </form-field>
            </div>
        </div>
    }
</div>
<div class="modal-footer">
    <button class="btn btn-primary" (click)="continue()" [buttonLoading]="isCreating" [disabled]="isCreating || !sourceOrgControl.value">
        Continue
    </button>
    <button class="btn btn-secondary" (click)="ref.close()">Cancel</button>
</div>
</div>
