<div class="modal">
<div class="modal-header">
    <h3>{{ modalTitle }}</h3>
</div>
<div class="modal-body">
    <modal-alerts [alerts]="localAlerts" (onClosed)="removeLocalAlert($event)"></modal-alerts>

    <form [formGroup]="form">
        <div class="grid-12">
            <div class="g-col-6">
                <form-field
                    [formControl]="form.controls.TreatmentTypeID"
                    fieldDefinitionName="TreatmentType"
                    [type]="FormFieldType.Select"
                    [formInputOptions]="treatmentTypeOptions"
                    placeholder="Select treatment type">
                </form-field>
            </div>
            <div class="g-col-6">
                <form-field
                    [formControl]="form.controls.TreatmentDetailedActivityTypeID"
                    fieldDefinitionName="TreatmentDetailedActivityType"
                    fieldDefinitionLabelOverride="Detailed Activity Type"
                    [type]="FormFieldType.Select"
                    [formInputOptions]="treatmentDetailedActivityTypeOptions"
                    placeholder="Select activity type">
                </form-field>
            </div>
        </div>

        <div class="grid-12">
            <div class="g-col-6">
                <form-field
                    [formControl]="form.controls.ProjectLocationID"
                    fieldLabel="Treatment Area"
                    [type]="FormFieldType.Select"
                    [formInputOptions]="treatmentAreaOptions"
                    placeholder="Select treatment area">
                </form-field>
            </div>
            <div class="g-col-6">
                <form-field
                    [formControl]="form.controls.TreatmentCodeID"
                    fieldDefinitionName="TreatmentCode"
                    [type]="FormFieldType.Select"
                    [formInputOptions]="treatmentCodeOptions"
                    placeholder="Select treatment code (optional)">
                </form-field>
            </div>
        </div>

        <div class="grid-12">
            <div class="g-col-6">
                <form-field
                    [formControl]="form.controls.TreatmentStartDate"
                    fieldDefinitionName="TreatmentStartDate"
                    fieldDefinitionLabelOverride="Start Date"
                    [type]="FormFieldType.Date">
                </form-field>
            </div>
            <div class="g-col-6">
                <form-field
                    [formControl]="form.controls.TreatmentEndDate"
                    fieldDefinitionName="TreatmentEndDate"
                    fieldDefinitionLabelOverride="End Date"
                    [type]="FormFieldType.Date">
                </form-field>
            </div>
        </div>

        <div class="grid-12">
            <div class="g-col-4">
                <form-field
                    [formControl]="form.controls.TreatmentFootprintAcres"
                    fieldDefinitionName="FootprintAcres"
                    [type]="FormFieldType.Number"
                    placeholder="0.00">
                </form-field>
            </div>
            <div class="g-col-4">
                <form-field
                    [formControl]="form.controls.TreatmentTreatedAcres"
                    fieldDefinitionName="TreatedAcres"
                    [type]="FormFieldType.Number"
                    placeholder="0.00 (optional)">
                </form-field>
            </div>
            <div class="g-col-4">
                <form-field
                    [formControl]="form.controls.CostPerAcre"
                    fieldDefinitionName="TreatmentCostPerAcre"
                    fieldDefinitionLabelOverride="Cost Per Acre"
                    [type]="FormFieldType.Currency">
                </form-field>
            </div>
        </div>

        <form-field
            [formControl]="form.controls.TreatmentNotes"
            fieldLabel="Notes"
            [type]="FormFieldType.Textarea"
            placeholder="Enter notes (optional, max 2000 characters)">
        </form-field>
    </form>
</div>
<div class="modal-footer">
    <button
        class="btn btn-primary"
        (click)="save()"
        [disabled]="isSubmitting"
        [buttonLoading]="isSubmitting">
        Save
    </button>
    <button
        class="btn btn-secondary"
        (click)="cancel()"
        [disabled]="isSubmitting">
        Cancel
    </button>
</div>
</div>
