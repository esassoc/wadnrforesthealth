<div class="breadcrumb">
    @for (item of items; track item) { @if (item.url && (items[items.length - 1] !== item || linkLast)) {
    <a [routerLink]="item.url" class="breadcrumb__item">{{ item.label }}</a>
    } @else {
    <span class="breadcrumb__item breadcrumb__item--active">{{ item.label }}</span>
    } }
</div>
