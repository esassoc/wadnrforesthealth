<page-header pageTitle="Invoice Payment Request Reports"></page-header>

<div class="page-body">
    <div class="card">
        <div class="card-header">
            <span class="card-title">Generate Invoice Payment Request Report</span>
        </div>
        <div class="card-body">
            <div class="grid-12">
                <div class="g-col-4">
                    <form-field
                        [formControl]="templateControl"
                        fieldLabel="Report Template"
                        [type]="FormFieldType.Select"
                        [formInputOptions]="templateOptions"
                        placeholder="Select a template">
                    </form-field>
                </div>
                <div class="g-col-4 d-flex align-items-end">
                    <button
                        class="btn btn-primary"
                        (click)="generateReport()"
                        [disabled]="isGenerating || !templateControl.value || selectedIprIDs.length === 0">
                        {{ isGenerating ? 'Generating...' : 'Generate Report' }}
                    </button>
                </div>
                <div class="g-col-4 d-flex align-items-end">
                    @if (selectedIprIDs.length > 0) {
                        <span class="text-muted">{{ selectedIprIDs.length }} IPR(s) selected</span>
                    }
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-3">
        <div class="card-header">
            <span class="card-title">1. Select a Project</span>
        </div>
        <div class="card-body">
            <wadnr-grid
                [rowData]="projects$ | async"
                [columnDefs]="projectColumnDefs"
                defaultRowSelection="singleRow"
                (selectionChanged)="onProjectSelectionChanged($event)"
                downloadFileName="projects"
                height="300px">
            </wadnr-grid>
        </div>
    </div>

    @if (selectedProjectID) {
        <div class="card mt-3">
            <div class="card-header">
                <span class="card-title">2. Select Invoice Payment Requests</span>
            </div>
            <div class="card-body">
                <wadnr-grid
                    [rowData]="iprs$ | async"
                    [columnDefs]="iprColumnDefs"
                    defaultRowSelection="multiRow"
                    (selectionChanged)="onIprSelectionChanged($event)"
                    downloadFileName="invoice-payment-requests"
                    height="300px">
                </wadnr-grid>
            </div>
        </div>
    }
</div>
