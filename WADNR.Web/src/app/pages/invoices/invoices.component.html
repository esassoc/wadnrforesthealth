<page-header pageTitle="Invoices"></page-header>

<div class="page-body">
    <wadnr-grid [rowData]="invoices$ | async" [columnDefs]="columnDefs" downloadFileName="invoices" fullscreenTitle="Invoices">
        @if (canManage$ | async) {
        <div customGridActionsRight>
            <button class="btn btn-sm btn-primary" (click)="createNewInvoice()">
                <span class="fas fa-plus"></span> Create New
            </button>
        </div>
        }
    </wadnr-grid>
</div>
